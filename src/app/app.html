<h1>Products</h1>

<p *ngIf="loading()">Loading...</p>
<p *ngIf="error()">{{ error() }}</p>

<ul *ngIf="!loading() && !error()">
  <li *ngFor="let product of products()">
    <h3>{{ product.title }}</h3>
    <p>{{ product.description }}</p>
    <small>{{ product.category }}</small>
    <hr>
  </li>
</ul>
